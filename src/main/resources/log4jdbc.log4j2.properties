log4jdbc.spylogdelegator.name=net.sf.log4jdbc.log.slf4j.Slf4jSpyLogDelegator
# sql 문장 내부에 존재하는 불필요한 공백 자동으로 제거하고 출력
# 쿼리 자체가 쓸데없이 길어지는 것을 막고, 로그 줄이는 목적
# 한 눈에 쿼리 확인이 편함
log4jdbc.trim.sql.extrablanklines=true

# 콘솔에 출력할 sql 한 줄의 최대 글자 수
# 긴 sql 쿼리가 중간에 끊겨서 잘 안보임
# 하나의 완성된 쿼리를 잘리지 않고 보기 좋게 정렬되어 출력
log4jdbc.maxlinelength=500