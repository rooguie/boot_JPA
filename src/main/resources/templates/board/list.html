<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container-md my-5">

    <!-- 커스텀 모던 스타일 CSS -->
    <style>
        body {
            background-color: #f8f9fa; /* 은은한 라이트 그레이 배경 */
        }
        .modern-header {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.5px;
        }
        .modern-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 16px; /* 부드럽고 둥근 모서리 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modern-card:hover {
            transform: translateY(-4px); /* 위로 부드럽게 떠오르는 효과 */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.07), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .btn-modern {
            background: linear-gradient(135deg, #4f46e5, #6366f1); /* 세련된 인디고 그라데이션 */
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            border: none;
            transition: opacity 0.2s;
        }
        .btn-modern:hover {
            opacity: 0.9;
            color: white;
        }
        .text-main {
            color: #0f172a;
            font-weight: 600;
        }
        .text-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .info-badge {
            background-color: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>

    <!-- 세련된 헤더 영역 -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="modern-header m-0">Our Journal</h1>
            <p class="text-sub m-0 mt-1">최신 소식과 생각을 공유하는 공간입니다.</p>
        </div>
        <a th:href="@{/board/register}" class="btn btn-modern shadow-sm">새 글 작성</a>
    </div>

    <!-- 게시글 피드 리스트 -->
    <div class="row g-4">
        <!-- 타임리프 반복문(th:each) -->
        <div class="col-12" th:each="board : ${list}">
            <div class="card modern-card p-4">
                <div class="row align-items-center">

                    <!-- 왼쪽: 메인 콘텐츠 -->
                    <div class="col-md-9">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="info-badge" th:text="'#' + ${board.bno}">#4</span>
                            <span class="text-sub fw-medium" th:text="${board.writer}">test4</span>
                            <span class="text-sub">·</span>
                            <!-- 날짜 포맷팅 -->
                            <span class="text-sub" th:text="${#strings.substring(board.regDate, 0, 10)}">2026-06-30</span>
                        </div>

                        <!-- 제목 -->
                        <h3 class="h5 text-main mb-2">
                            <a th:href="@{/board/detail(bno=${board.bno})}" class="text-decoration-none text-main stretched-link" th:text="${board.title}">
                                깔끔하고 트렌디한 웹 인터페이스를 설계하는 방법
                            </a>
                        </h3>

                        <!-- 본문 요약 -->
                        <p class="text-sub text-truncate mb-0" style="max-width: 750px;" th:text="${board.content}">
                            test4 콘텐츠 내용이 여기에 들어갑니다. 세련된 레이아웃을 위해 본문은 한 줄로 깔끔하게 떨어지도록 처리했습니다.
                        </p>
                    </div>

                    <!-- 오른쪽: 메타 데이터 (조회수, 댓글 등) -->
                    <div class="col-md-3 text-md-end mt-3 mt-md-0">
                        <div class="d-inline-flex justify-content-md-end gap-3 text-sub">
                            <span class="d-flex align-items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                <th:block th:text="${board.readCount}">0</th:block>
                            </span>
                            <span class="d-flex align-items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
                                <th:block th:text="${board.cmtQty}">0</th:block>
                            </span>
                            <span class="d-flex align-items-center gap-1" th:if="${board.fileQty > 0}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 11-2.828-2.828l6.414-6.414a4 4 0 015.656 5.656l-6.415 6.415a6 6 0 11-8.486-8.486L10.5 5" /></svg>
                                <th:block th:text="${board.fileQty}">0</th:block>
                            </span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- 데이터 없음 처리 -->
        <div class="col-12 text-center py-5 modern-card" th:if="${#lists.isEmpty(list)}">
            <p class="text-sub fw-medium mb-0">아직 등록된 게시글이 없습니다.</p>
        </div>
    </div>

</div>
</html>
